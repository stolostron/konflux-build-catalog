apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/stolostron/konflux-build-catalog?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: "{{revision}}"
    build.appstudio.redhat.com/pull_request_number: "{{pull_request_number}}"
    build.appstudio.redhat.com/target_branch: "{{target_branch}}"
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression:
      event == "pull_request" && target_branch
      == "main" && ("pipelines/common-fbc.yaml".pathChanged() || ".tekton/common-pipeline-fbc-pull-request.yaml".pathChanged())
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: konflux-build-catalog-fbc
    appstudio.openshift.io/component: common-pipeline-fbc
    pipelines.appstudio.openshift.io/type: build
  name: common-pipeline-fbc-pull-request
  namespace: crt-redhat-acm-tenant
spec:
  params:
    - name: git-url
      value: "{{source_url}}"
    - name: revision
      value: "{{revision}}"
    - name: output-image
      value: quay.io/redhat-user-workloads/crt-redhat-acm-tenant/common-pipeline-fbc:on-pr-{{revision}}
    - name: image-expires-after
      value: 5d
    - name: dockerfile
      value: Containerfile.catalog
    - name: path-context
      value: test/fbc
    - name: build-args
      value:
        - CATALOG_VERSION=v4.21
    - name: build-platforms
      value:
        - linux/x86_64
    - name: opm-args
      value:
        - alpha
        - render-template
        - basic
        - -o=yaml
        - --migrate-level=bundle-object-to-csv-metadata
        - test/fbc/catalog-template.yaml
    - name: opm-output-path
      value: test/fbc/multicluster-global-hub-operator-rh/catalog-current.yaml
  pipelineRef:
    resolver: git
    params:
      - name: url
        value: https://github.com/stolostron/konflux-build-catalog.git
      - name: revision
        value: "{{revision}}" # {{revision}} is the commit hash of the PR branch
      - name: pathInRepo
        value: pipelines/common-fbc.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-common-pipeline-fbc
  workspaces:
    - name: git-auth
      secret:
        secretName: "{{ git_auth_secret }}"
status: {}
