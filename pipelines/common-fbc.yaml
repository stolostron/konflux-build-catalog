apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: stolostron-common-fbc-builder-pipeline
spec:
  description: |
    This pipeline is ideal for building and verifying [file-based catalogs](https://konflux-ci.dev/docs/end-to-end/building-olm/#building-the-file-based-catalog).

    _Uses `buildah` to create a container image. Its build-time tests are limited to verifying the included catalog and do not scan the image.
    This pipeline is pushed as a Tekton bundle to [quay.io](https://quay.io/repository/konflux-ci/tekton-catalog/pipeline-fbc-builder?tab=tags)_
  finally:
    - name: slack-webhook-notification
      params:
        - name: message
          value: |
            :bangbang: PipelineRun name: $(context.pipelineRun.name) id: $(context.pipelineRun.uid) failed:
            - git source: $(params.git-url)/commit/$(params.revision)
            - output image: $(params.output-image)
            - see details: https://konflux-ui.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/ns/$(context.pipelineRun.namespace)/applications/$(params.konflux-application-name)/pipelineruns/$(context.pipelineRun.name)
        - name: secret-name
          value: $(params.slack-webhook-url-secret-name)
        - name: key-name
          value: $(params.slack-webhook-url-secret-key)
        - name: user-ids
          value:
            - $(params.slack-member-id)
        - name: group-ids
          value:
            - $(params.slack-group-id)
      taskRef:
        params:
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-slack-webhook-notification:0.1@sha256:02842e9c752056c47a409f69ed462cfd38cbd6b15facb796564a610b549222ea
          - name: name
            value: slack-webhook-notification
          - name: kind
            value: Task
        resolver: bundles
      when:
        - input: $(tasks.status)
          operator: in
          values:
            - "Failed"
        - input: $(params.send-slack-notification)
          operator: in
          values:
            - "true"
  params:
    - description: Source Repository URL
      name: git-url
      type: string
    - default: ""
      description: Revision of the Source Repository
      name: revision
      type: string
    - description: Fully Qualified Output Image
      name: output-image
      type: string
    - default: .
      description: Path to the source code of an application's component from where to build image.
      name: path-context
      type: string
    - default: Dockerfile
      description: Path to the Dockerfile inside the context specified by parameter path-context
      name: dockerfile
      type: string
    - default: "false"
      description: Skip checks against built image
      name: skip-checks
      type: string
    - default: "true"
      description: Execute the build with network isolation
      name: hermetic
      type: string
    - default: ""
      description: Build dependencies to be prefetched
      name: prefetch-input
      type: string
    - default: ""
      description: Image tag expiration time, time values could be something like 1h, 2d, 3w for hours, days, and weeks, respectively.
      name: image-expires-after
      type: string
    - default: "true"
      description: Add built image into an OCI image index
      name: build-image-index
      type: string
    - name: enable-cache-proxy
      default: "false"
      description: Enable cache proxy configuration
      type: string
    - default: 'true'
      description: Use the package registry proxy when prefetching dependencies
      name: enable-package-registry-proxy
    - default: []
      description: Array of --build-arg values ("arg=value" strings) for buildah
      name: build-args
      type: array
    - default: ""
      description: Path to a file with build arguments for buildah, see https://www.mankier.com/1/buildah-build#--build-arg-file
      name: build-args-file
      type: string
    - default: ''
      description: Sets the image created time and the SOURCE_DATE_EPOCH build argument. On its own, it does not change file timestamps inside the layers (set rewrite-timestamp to "true" for that). Leave empty to keep the actual build time.
      name: source-date-epoch
      type: string
    - default: 'false'
      description: When "true", clamp file modification times in the image layers to at most source-date-epoch. Does nothing unless source-date-epoch is set.
      name: rewrite-timestamp
      type: string
    - default: 'false'
      description: When "true", omit the build history (history timestamps, layer metadata, etc.) from the resulting image.
      name: omit-history
      type: string
    - default:
        - linux/x86_64
      description: List of platforms to build the container images on. The available set of values is determined by the configuration of the multi-platform-controller.
      name: build-platforms
      type: array
    - default: []
      description: Additional tags to add to the image
      name: additional-tags
      type: array
    - default: []
      description: An array of arguments passed to opm when executed.
      name: opm-args
      type: array
    - default: ""
      description: The path where the output from opm will be stored (i.e., where catalog.json will be saved).
      name: opm-output-path
      type: string
    - default: ""
      description: The path to the ImageDigestMirrorSet file in YAML format.
      name: idms-path
      type: string
    - default: "false"
      description: Whether to skip FIPS checks
      name: skip-fips-check
      type: string
    - default: "false"
      description: Whether to send slack notification when the pipeline run failed
      name: send-slack-notification
      type: string
    - default: ""
      name: konflux-application-name
      description: The name of the application in Konflux, this is required when send-slack-notification is true
      type: string
    - default: "slack-acm-notify-secret"
      name: slack-webhook-url-secret-name
      description: |
        The name of the secret in the konflux tenant namespace which contains the slack webhook url, this is required when send-slack-notification is true.
        If it does not exist, please prepare the slack webhook url for your team and contact the konflux tenant admins to create it.
        The default secret is "slack-acm-notify-secret", which will send the slack message to the forum-acm-konflux-pipeline-status channel.
        See details: https://konflux.pages.redhat.com/docs/users/patterns/slack-notifications.html
      type: string
    - default: "forum-acm-konflux-pipeline-status-webhook-url"
      name: slack-webhook-url-secret-key
      description: |
        The key of the slack webhook url in the secret, this is required when send-slack-notification is true.
        Should be changed according to how the secret slack-webhook-url-secret-name is created.
        The default key is "forum-acm-konflux-pipeline-status-webhook-url", which will send the slack message to the forum-acm-konflux-pipeline-status channel.
        See details: https://konflux.pages.redhat.com/docs/users/patterns/slack-notifications.html
      type: string
    - default: ""
      name: slack-member-id
      description: |
        The member id of the slack user, if this is set will mention the user in the slack message; this id can be found in the slack user profile
        by clicking the user profile, in the profile pop-up, click the "More" icon(three dots), and then click "Copy member ID" button. e.g. U0600000000
      type: string
    - default: ""
      name: slack-group-id
      description: |
        The group id of the slack user group, if this is set will mention the group in the slack message; this id can be found by viewing the user group details. e.g. S07XXXXXXXX
  results:
    - description: ""
      name: IMAGE_URL
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - description: ""
      name: IMAGE_DIGEST
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - description: ""
      name: CHAINS-GIT_URL
      value: $(tasks.clone-repository.results.url)
    - description: ""
      name: CHAINS-GIT_COMMIT
      value: $(tasks.clone-repository.results.commit)
  tasks:
    - name: init
      params:
        - name: enable-cache-proxy
          value: $(params.enable-cache-proxy)
      taskRef:
        params:
          - name: name
            value: init
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-init:0.4.3@sha256:fb17ececc359d7e330395d6a562eacbf0089776697ffe1b10c08f91273e6b2c0
          - name: kind
            value: task
        resolver: bundles
    - name: clone-repository
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.revision)
        - name: ociStorage
          value: $(params.output-image).git
        - name: ociArtifactExpiresAfter
          value: $(params.image-expires-after)
      runAfter:
        - init
      taskRef:
        params:
          - name: name
            value: git-clone-oci-ta
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-git-clone-oci-ta:0.2.5@sha256:d5f39d5a89e8073774bac1a9b9013709c5931921dd4fb1cf662f800e6c5c9ee7
          - name: kind
            value: task
        resolver: bundles
      workspaces:
        - name: basic-auth
          workspace: git-auth
    - name: run-opm-command
      params:
        - name: SOURCE_ARTIFACT
          value: $(tasks.fbc-inject-lifecycle.results.SOURCE_ARTIFACT)
        - name: ociStorage
          value: $(params.output-image).opm
        - name: ociArtifactExpiresAfter
          value: $(params.image-expires-after)
        - name: OPM_ARGS
          value:
            - $(params.opm-args[*])
        - name: OPM_OUTPUT_PATH
          value: $(params.opm-output-path)
        - name: IDMS_PATH
          value: $(params.idms-path)
      runAfter:
        - fbc-inject-lifecycle
      taskRef:
        params:
          - name: name
            value: run-opm-command-oci-ta
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-run-opm-command-oci-ta:0.1@sha256:a4865bdefb5c74eec6ee5a4919ed6ab9da723326455f34a33f03e590c8f5ae77
          - name: kind
            value: task
        resolver: bundles
    - name: prefetch-dependencies
      params:
        - name: input
          value: $(params.prefetch-input)
        - name: enable-package-registry-proxy
          value: $(params.enable-package-registry-proxy)
        - name: SOURCE_ARTIFACT
          value: $(tasks.run-opm-command.results.SOURCE_ARTIFACT)
        - name: ociStorage
          value: $(params.output-image).prefetch
        - name: ociArtifactExpiresAfter
          value: $(params.image-expires-after)
      runAfter:
        - run-opm-command
      taskRef:
        params:
          - name: name
            value: prefetch-dependencies-oci-ta
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-prefetch-dependencies-oci-ta:0.4.1@sha256:ba1a3975a1e7b12ee1d11c4885930bf3540f532ddb57b5b66bb8b1122f41fa65
          - name: kind
            value: task
        resolver: bundles
      workspaces:
        - name: git-basic-auth
          workspace: git-auth
        - name: netrc
          workspace: netrc
    - matrix:
        params:
          - name: PLATFORM
            value:
              - $(params.build-platforms)
      name: build-images
      params:
        - name: IMAGE
          value: $(params.output-image)
        - name: DOCKERFILE
          value: $(params.dockerfile)
        - name: CONTEXT
          value: $(params.path-context)
        - name: HERMETIC
          value: $(params.hermetic)
        - name: PREFETCH_INPUT
          value: $(params.prefetch-input)
        - name: IMAGE_EXPIRES_AFTER
          value: $(params.image-expires-after)
        - name: COMMIT_SHA
          value: $(tasks.clone-repository.results.commit)
        - name: BUILD_ARGS
          value:
            - $(params.build-args[*])
        - name: BUILD_ARGS_FILE
          value: $(params.build-args-file)
        - name: SOURCE_URL
          value: $(tasks.clone-repository.results.url)
        - name: HTTP_PROXY
          value: $(tasks.init.results.http-proxy)
        - name: NO_PROXY
          value: $(tasks.init.results.no-proxy)
        - name: SOURCE_DATE_EPOCH
          value: $(params.source-date-epoch)
        - name: REWRITE_TIMESTAMP
          value: $(params.rewrite-timestamp)
        - name: OMIT_HISTORY
          value: $(params.omit-history)
        - name: SOURCE_ARTIFACT
          value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
        - name: CACHI2_ARTIFACT
          value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
        - name: IMAGE_APPEND_PLATFORM
          value: 'true'
      runAfter:
        - clone-repository
      taskRef:
        params:
          - name: name
            value: buildah-remote-oci-ta
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-buildah-remote-oci-ta:0.10@sha256:3cda9a4cf830879f52d07d764966c427067713d6ae192600c29968f00c19433c
          - name: kind
            value: task
        resolver: bundles
    - name: build-image-index
      params:
        - name: IMAGE
          value: $(params.output-image)
        - name: ALWAYS_BUILD_INDEX
          value: $(params.build-image-index)
        - name: IMAGES
          value:
            - $(tasks.build-images.results.IMAGE_REF[*])
      runAfter:
        - build-images
      taskRef:
        params:
          - name: name
            value: build-image-index
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-build-image-index:0.3@sha256:70c52e88e737340e7b58418fda38c13273aa7cdf587b825778e3560aca1d1133
          - name: kind
            value: task
        resolver: bundles
    - name: deprecated-base-image-check
      params:
        - name: IMAGE_URL
          value: $(tasks.build-image-index.results.IMAGE_URL)
        - name: IMAGE_DIGEST
          value: $(tasks.build-image-index.results.IMAGE_DIGEST)
      runAfter:
        - build-image-index
      taskRef:
        params:
          - name: name
            value: deprecated-image-check
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-deprecated-image-check:0.5@sha256:0ccc688a77e9b7b0b8973c132a1e840844137e77f887be4a0bec8893b0776872
          - name: kind
            value: task
        resolver: bundles
      when:
        - input: $(params.skip-checks)
          operator: in
          values:
            - 'false'
    - name: apply-tags
      params:
        - name: IMAGE_URL
          value: $(tasks.build-image-index.results.IMAGE_URL)
        - name: IMAGE_DIGEST
          value: $(tasks.build-image-index.results.IMAGE_DIGEST)
        - name: ADDITIONAL_TAGS
          value: $(params.additional-tags[*])
      runAfter:
        - build-image-index
      taskRef:
        params:
          - name: name
            value: apply-tags
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-apply-tags:0.3@sha256:6387614ae4f9efa8abb7c4175db0ce5d958bc2b90665b4704880e46fbe0535bf
          - name: kind
            value: task
        resolver: bundles
    - name: validate-fbc
      params:
        - name: IMAGE_URL
          value: $(tasks.build-image-index.results.IMAGE_URL)
        - name: IMAGE_DIGEST
          value: $(tasks.build-image-index.results.IMAGE_DIGEST)
      runAfter:
        - build-image-index
      taskRef:
        params:
          - name: name
            value: validate-fbc
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-validate-fbc:0.2@sha256:8988a61a5680521d583dc3a4c7d378529337ac99cf521e38a2786b99824f64f6
          - name: kind
            value: task
        resolver: bundles
      when:
        - input: $(params.skip-checks)
          operator: in
          values:
            - 'false'
    - name: fbc-target-index-pruning-check
      params:
        - name: IMAGE_URL
          value: $(tasks.build-image-index.results.IMAGE_URL)
        - name: IMAGE_DIGEST
          value: $(tasks.build-image-index.results.IMAGE_DIGEST)
        - name: TARGET_INDEX
          value: registry.redhat.io/redhat/redhat-operator-index
        - name: RENDERED_CATALOG_DIGEST
          value: $(tasks.validate-fbc.results.RENDERED_CATALOG_DIGEST)
      runAfter:
        - validate-fbc
      taskRef:
        params:
          - name: name
            value: fbc-target-index-pruning-check
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-fbc-target-index-pruning-check:0.1@sha256:a7696d92734be62700723b6d2c40dfaee4809e6a1d42b28deefc7c7463176c32
          - name: kind
            value: task
        resolver: bundles
      when:
        - input: $(params.skip-checks)
          operator: in
          values:
            - 'false'
    - name: fbc-fips-check-oci-ta
      params:
        - name: image-digest
          value: $(tasks.build-image-index.results.IMAGE_DIGEST)
        - name: image-url
          value: $(tasks.build-image-index.results.IMAGE_URL)
        - name: SOURCE_ARTIFACT
          value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
      runAfter:
        - build-image-index
      taskRef:
        params:
          - name: name
            value: fbc-fips-check-oci-ta
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-fbc-fips-check-oci-ta:0.1@sha256:935adb61a5c9be0f619edc8838771ad3fe08cf17689094aeaaeac493af2a2115
          - name: kind
            value: task
        resolver: bundles
      when:
        - input: $(params.skip-checks)
          operator: in
          values:
            - 'false'
        - input: $(params.skip-fips-check)
          operator: in
          values:
            - 'false'
    - name: fbc-inject-lifecycle
      taskRef:
        resolver: bundles
        params:
          - name: kind
            value: task
          - name: name
            value: fbc-inject-lifecycle-oci-ta
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-fbc-inject-lifecycle-oci-ta:0.1@sha256:1be92a668fd429a1273dfd2046631c51ee0954209d99631614474ad6a1d02626
      params:
        - name: DOCKERFILE
          value: $(params.dockerfile)
        - name: CONTEXT
          value: $(params.path-context)
        - name: SOURCE_ARTIFACT
          value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
        - name: ociStorage
          value: $(params.output-image).lifecycle
        - name: ociArtifactExpiresAfter
          value: $(params.image-expires-after)
      runAfter:
        - clone-repository
  workspaces:
    - name: git-auth
      optional: true
    - name: netrc
      optional: true
